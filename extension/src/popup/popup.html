<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Audio Equalizer</title>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>Audio Equalizer</h1>
      <button id="resetBtn" class="reset-btn">Reset</button>
    </div>

    <div class="presets">
      <label>Presets:</label>
      <select id="presetSelect">
        <option value="flat">Flat</option>
        <option value="bass-boost">Bass Boost</option>
        <option value="treble-boost">Treble Boost</option>
        <option value="vocal">Vocal</option>
        <option value="rock">Rock</option>
        <option value="pop">Pop</option>
        <option value="jazz">Jazz</option>
        <option value="classical">Classical</option>
      </select>
    </div>

    <div class="volume-control">
      <label>Volume: <span id="volumeValue">0</span>dB</label>
      <input type="range" id="volumeSlider" min="-20" max="20" value="0" step="1">
    </div>

    <div class="eq-sliders">
      <div class="slider-group">
        <label>31Hz</label>
        <input type="range" class="eq-slider" data-freq="31" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>63Hz</label>
        <input type="range" class="eq-slider" data-freq="63" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>125Hz</label>
        <input type="range" class="eq-slider" data-freq="125" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>250Hz</label>
        <input type="range" class="eq-slider" data-freq="250" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>500Hz</label>
        <input type="range" class="eq-slider" data-freq="500" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>1kHz</label>
        <input type="range" class="eq-slider" data-freq="1000" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>2kHz</label>
        <input type="range" class="eq-slider" data-freq="2000" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>4kHz</label>
        <input type="range" class="eq-slider" data-freq="4000" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>8kHz</label>
        <input type="range" class="eq-slider" data-freq="8000" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
      <div class="slider-group">
        <label>16kHz</label>
        <input type="range" class="eq-slider" data-freq="16000" min="-12" max="12" value="0" step="1">
        <span class="eq-value">0</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
